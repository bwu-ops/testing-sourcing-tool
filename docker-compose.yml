services:
  db:
    image: postgres:16-alpine
    container_name: scaffold-postgres
    environment:
      POSTGRES_DB: scaffold
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d scaffold"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: scaffold-app
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
      - /var/log
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    user: "1000:1000"
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
